stages:
  prepare:
    cmd: python -m src.data.prepare_data
    deps:
      - src/data/prepare_data.py
      - src/data/validate_data.py
      - src/data/load_data.py
      - src/utils/config.py
      - data/raw/train.csv
      - data/raw/test.csv
    params:
      - data.id_column
      - data.missing_threshold
      - data.min_train_rows
      - data.min_test_rows
    outs:
      - data/interim/clean.csv
      - data/interim/clean_test.csv
    metrics:
      - data/interim/data_profile.json

  featurize:
    cmd: python -m src.features.build_features
    deps:
      - src/features/build_features.py
      - src/features/transformers.py
      - src/utils/config.py
      - data/interim/clean.csv
      - data/interim/clean_test.csv
    params:
      - training.test_size
      - training.random_state
      - features.use_polynomial
      - features.polynomial_degree
      - features.log_target
    outs:
      - data/processed/X_train.csv
      - data/processed/X_test.csv
      - data/processed/y_train.csv
      - data/processed/y_test.csv
      - data/processed/X_inference.csv
      - data/processed/preprocessor.pkl
    metrics:
      - data/processed/features_metadata.json

  baseline:
    cmd: python -m src.models.baseline
    deps:
      - src/models/baseline.py
      - src/models/metrics.py
      - src/utils/config.py
      - data/interim/clean.csv
      - data/processed/X_train.csv
      - data/processed/X_test.csv
      - data/processed/y_train.csv
      - data/processed/y_test.csv
    params:
      - training.test_size
      - training.random_state
      - training.cv_folds
      - features.log_target
    outs:
      - models/baseline_naive.pkl
      - models/baseline_engineered.pkl
    metrics:
      - reports/baseline_metrics.json
      - reports/baseline_comparison.md

  train:
    cmd: .\venv\Scripts\python.exe -m src.models.train
    deps:
      - src/models/train.py
      - src/models/baseline.py
      - src/models/metrics.py
      - src/utils/mlflow_utils.py
      - src/utils/config.py
      - data/interim/clean.csv
      - data/processed/X_train.csv
      - data/processed/X_test.csv
      - data/processed/y_train.csv
      - data/processed/y_test.csv
    params:
      - training.test_size
      - training.random_state
      - training.cv_folds
      - features.log_target
      - mlflow.experiment_name
      - mlflow.tracking_uri
    outs:
      - models/best_model.pkl
    metrics:
      - reports/training_summary.json

  evaluate:
    cmd: .\venv\Scripts\python.exe -m src.models.evaluate
    deps:
      - src/models/evaluate.py
      - src/models/registry.py
      - src/models/train.py
      - src/models/metrics.py
      - src/utils/mlflow_utils.py
      - src/utils/config.py
      - data/processed/X_train.csv
      - data/processed/y_train.csv
      - reports/training_summary.json
      - mlflow.db
    params:
      - training.cv_folds
      - evaluation.top_n_models
      - evaluation.significance_level
      - mlflow.tracking_uri
      - mlflow.registered_model_name
    metrics:
      - reports/significance_tests.json
      - reports/registry_summary.json
      - reports/evaluation_metrics.json
      - reports/model_comparison.md
